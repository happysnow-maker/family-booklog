<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패밀리로그 — 우리 가족의 모든 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#FBF8F2;
    --card:#FFFFFF;
    --ink:#3B332B;
    --ink-soft:#A79A87;
    --line:#EFE6D8;

    --dad:#6E9BFF;    --dad-tint:#EAF0FF;
    --mom:#FF7FA6;    --mom-tint:#FFE9F0;
    --girl1:#FFA23C;  --girl1-tint:#FFEEDA;
    --girl2:#B08CFF;  --girl2-tint:#F3EDFF;

    --t-book:#8B5E34;
    --t-movie:#3B4C99;
    --t-youtube:#D93025;
    --t-other:#767066;

    --stamp:#C1483A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(rgba(59,51,43,0.06) 1px, transparent 1.4px) 0 0/16px 16px,
      var(--bg);
    color:var(--ink);
    font-family:'Pretendard',-apple-system,sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }

  .setup-banner{
    max-width:920px;margin:0 auto 16px;
    background:#FFF4E0;border:1.5px dashed #D9A63E;border-radius:14px;
    padding:14px 16px;font-size:13px;line-height:1.6;color:#6B4E12;
    display:none;
  }
  .setup-banner.show{display:block;}
  .setup-banner code{background:#00000010;padding:1px 6px;border-radius:5px;}

  .app{
    max-width:920px;margin:0 auto;
    display:flex;
    background:var(--card);
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 14px 34px -20px rgba(59,51,43,0.35);
  }

  /* ===== sidebar: diary index tabs ===== */
  .sidebar{
    width:196px;flex-shrink:0;
    background:var(--bg);
    border-right:1px dashed var(--line);
    display:flex;flex-direction:column;
    padding:20px 12px;
  }
  .nameplate{padding:2px 6px 18px;}
  .np-title{display:block;font-family:'Gaegu',sans-serif;font-weight:700;font-size:24px;color:var(--ink);line-height:1.1;}
  .np-sub{display:block;font-size:10px;font-weight:700;color:var(--ink-soft);letter-spacing:0.06em;margin-top:5px;}
  .sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#9BD6A8;margin-right:5px;}
  .sync-dot.busy{background:#E8C36A;}

  .shelf-list{display:flex;flex-direction:column;gap:6px;flex:1;}
  .shelf-slot{
    all:unset;
    display:flex;align-items:center;gap:9px;
    box-sizing:border-box;
    cursor:pointer;
    padding:11px 14px;
    border-radius:12px;
    font-size:13.5px;font-weight:700;color:var(--ink-soft);
    transition:.15s ease;
  }
  .shelf-slot .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--line);}
  .shelf-slot:hover{background:var(--card);}
  .shelf-slot.active{color:var(--ink);}
  .shelf-slot.active .dot{background:var(--ink);}
  .shelf-slot[data-m="박형민"].active{background:var(--dad-tint);}
  .shelf-slot[data-m="박형민"].active .dot{background:var(--dad);}
  .shelf-slot[data-m="이희연"].active{background:var(--mom-tint);}
  .shelf-slot[data-m="이희연"].active .dot{background:var(--mom);}
  .shelf-slot[data-m="박한별"].active{background:var(--girl1-tint);}
  .shelf-slot[data-m="박한별"].active .dot{background:var(--girl1);}
  .shelf-slot[data-m="박한솔"].active{background:var(--girl2-tint);}
  .shelf-slot[data-m="박한솔"].active .dot{background:var(--girl2);}
  .shelf-slot[data-m="전체"].active{background:#EFEAE0;}

  .shelf-gap{border-top:1px dashed var(--line);margin:8px 4px;}

  .shelf-slot-gold.active{background:#FCEFD9;}
  .shelf-slot-gold.active .dot{background:var(--girl1);}

  /* ===== main panel ===== */
  .main{flex:1;min-width:0;padding:26px 28px 32px;}
  .main-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
  .main-head h2{font-family:'Gaegu',sans-serif;font-size:24px;font-weight:700;margin:0;}
  .stats-line{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin:2px 0 12px;}

  .type-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .tchip{
    border:1px solid var(--line);background:var(--card);cursor:pointer;
    font-family:'Pretendard',sans-serif;font-weight:700;font-size:12px;
    padding:6px 12px;border-radius:999px;color:var(--ink-soft);transition:.15s ease;
  }
  .tchip.active{color:#fff;border-color:transparent;}
  .tchip[data-t="전체"].active{background:var(--ink);}
  .tchip[data-t="book"].active{background:var(--t-book);}
  .tchip[data-t="movie"].active{background:var(--t-movie);}
  .tchip[data-t="youtube"].active{background:var(--t-youtube);}
  .tchip[data-t="other"].active{background:var(--t-other);}

  .btn-add{
    background:var(--ink);color:#fff;border:none;border-radius:999px;
    padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:'Pretendard',sans-serif;transition:.15s ease;
  }
  .btn-add:hover{transform:translateY(-1px);}

  /* form */
  .form-card{
    background:var(--bg);border:1px dashed var(--line);border-radius:18px;
    padding:18px 18px 16px;margin-bottom:18px;display:none;
  }
  .form-card.open{display:block;}
  .form-title{font-family:'Gaegu',sans-serif;font-size:19px;font-weight:700;margin:0 0 14px;}

  .type-toggle{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .type-btn{
    flex:1;min-width:70px;border:1.5px solid var(--line);background:var(--card);
    border-radius:10px;padding:8px 6px;font-size:12.5px;font-weight:700;
    color:var(--ink-soft);cursor:pointer;text-align:center;
  }
  .type-btn.active{color:#fff;border-color:transparent;}
  .type-btn.active[data-t="book"]{background:var(--t-book);}
  .type-btn.active[data-t="movie"]{background:var(--t-movie);}
  .type-btn.active[data-t="youtube"]{background:var(--t-youtube);}
  .type-btn.active[data-t="other"]{background:var(--t-other);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;position:relative;}
  .field.full{grid-column:1/-1;}
  label{font-size:11.5px;color:var(--ink-soft);font-weight:700;}
  input,select,textarea{
    font-family:'Pretendard',sans-serif;border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;font-size:13.5px;color:var(--ink);
    background:var(--card);outline:none;transition:border-color .15s ease;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--ink);}
  textarea{resize:vertical;min-height:82px;line-height:1.6;}
  .range-row{display:flex;align-items:center;gap:6px;}
  .range-row span{color:var(--ink-soft);font-size:12px;}

  /* search dropdown (책/영화/유튜브 공용) */
  .search-dd{
    position:absolute;top:100%;left:0;right:0;margin-top:4px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 8px 20px -8px rgba(0,0,0,0.25);z-index:20;
    max-height:260px;overflow-y:auto;padding:6px;
  }
  .book-result{
    all:unset;display:flex;gap:10px;align-items:center;width:100%;
    padding:7px 8px;border-radius:8px;cursor:pointer;box-sizing:border-box;
  }
  .book-result:hover{background:var(--bg);}
  .book-result img{width:30px;height:42px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--line);}
  .book-noimg{width:30px;height:42px;border-radius:4px;background:var(--line);flex-shrink:0;display:block;}
  .br-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .br-text b{font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .br-text i{font-size:11px;font-style:normal;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .thumb-preview{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11.5px;color:var(--ink-soft);}
  .thumb-preview img{width:24px;height:34px;object-fit:cover;border-radius:4px;}

  .yt-mode-toggle{display:flex;gap:6px;margin-top:6px;}
  .yt-mode-btn{
    border:1px solid var(--line);background:var(--card);cursor:pointer;
    font-family:'Pretendard',sans-serif;font-weight:700;font-size:11px;
    padding:5px 10px;border-radius:999px;color:var(--ink-soft);
  }
  .yt-mode-btn.active{background:var(--t-youtube);color:#fff;border-color:transparent;}
  .yt-channel-info{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-top:6px;font-size:11.5px;color:var(--t-youtube);font-weight:700;
    background:#FDE9E7;border-radius:8px;padding:6px 10px;
  }
  .yt-channel-info button{
    background:none;border:none;color:var(--ink-soft);font-size:11px;font-weight:700;
    cursor:pointer;text-decoration:underline;padding:0;
  }

  .status-toggle{display:flex;gap:8px;}
  .status-btn{
    flex:1;border:1.5px solid var(--line);background:var(--card);
    border-radius:10px;padding:10px 10px;font-size:13px;font-weight:700;
    color:var(--ink-soft);cursor:pointer;text-align:center;
  }
  .status-btn.active{color:#fff;border-color:transparent;}
  .status-btn.active[data-s="reading"]{background:#B08CFF;}
  .status-btn.active[data-s="done"]{background:var(--stamp);}

  .attach-input{font-size:12.5px;}
  .attach-preview{display:flex;align-items:center;gap:10px;margin-top:8px;}
  .attach-preview img{width:56px;height:56px;object-fit:cover;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
  .btn-remove-attach{background:none;border:1px solid var(--line);color:var(--ink-soft);
    border-radius:999px;padding:5px 12px;font-size:11.5px;font-weight:700;cursor:pointer;}

  .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);
    border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-save{background:var(--ink);color:#fff;border:none;border-radius:999px;
    padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}

  /* entries */
  .entry{
    position:relative;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:15px 17px;margin-bottom:10px;
  }
  .entry-row{display:flex;gap:12px;}
  .entry-thumb{width:44px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
  .entry-body{flex:1;min-width:0;}
  .entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .entry-title-wrap{min-width:0;}
  .entry-type-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;display:inline-block;margin-bottom:4px;}
  .entry-type-tag.book{background:var(--t-book);}
  .entry-type-tag.movie{background:var(--t-movie);}
  .entry-type-tag.youtube{background:var(--t-youtube);}
  .entry-type-tag.other{background:var(--t-other);}
  .entry-title{font-size:15.5px;font-weight:800;margin:0;line-height:1.4;}
  .entry-creator{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
  .badge-row{display:flex;gap:8px;flex-shrink:0;align-items:center;}
  .badge{font-size:10.5px;font-weight:800;color:#fff;padding:4px 10px;border-radius:999px;white-space:nowrap;}
  .badge[data-m="박형민"]{background:var(--dad);}
  .badge[data-m="이희연"]{background:var(--mom);}
  .badge[data-m="박한별"]{background:var(--girl1);}
  .badge[data-m="박한솔"]{background:var(--girl2);}

  .stamp{
    font-family:'Gaegu',sans-serif;font-weight:700;font-size:11.5px;
    color:var(--stamp);border:2px solid var(--stamp);border-radius:999px;
    padding:3px 10px;transform:rotate(-6deg);white-space:nowrap;
    opacity:0.9;
  }
  .status-reading{font-size:10.5px;font-weight:700;color:#8A6FD9;background:#F3EDFF;
    padding:4px 10px;border-radius:999px;white-space:nowrap;}

  .entry-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:8px 0 9px;}
  .meta-pill{font-size:11px;font-weight:700;color:var(--ink-soft);background:var(--bg);
    border-radius:999px;padding:4px 10px;}
  .entry-link{font-size:11px;font-weight:700;color:var(--t-youtube);text-decoration:none;
    background:#FDE9E7;border-radius:999px;padding:4px 10px;}
  .entry-content{font-size:13.5px;line-height:1.7;color:#4A4038;white-space:pre-wrap;}
  .entry-attach{width:100%;max-height:240px;object-fit:cover;border-radius:12px;margin-top:10px;display:block;}
  .entry-toggle{
    all:unset;display:inline-block;margin-top:8px;cursor:pointer;
    font-size:11.5px;font-weight:700;color:var(--ink-soft);
    border-bottom:1px dashed var(--ink-soft);
  }
  .entry-toggle:hover{color:var(--ink);}
  .entry-actions{display:flex;justify-content:flex-end;gap:4px;margin-bottom:2px;opacity:0.55;transition:opacity .15s ease;}
  .entry:hover .entry-actions{opacity:1;}
  .entry-edit,.entry-del{background:none;border:none;cursor:pointer;
    font-size:10.5px;color:var(--ink-soft);font-weight:700;
    padding:4px 8px;border-radius:6px;}
  .entry-edit:hover{background:var(--bg);color:var(--ink);}
  .entry-del.confirm{color:#E23F6B;background:#FDE7ED;}

  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:44px 20px;
    border:1.5px dashed var(--line);border-radius:16px;}
  .empty b{display:block;font-family:'Gaegu',sans-serif;font-size:19px;color:var(--ink);margin-bottom:6px;font-weight:700;}

  /* wrap view */
  .year-switch{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .year-switch button{background:var(--bg);border:1px solid var(--line);border-radius:50%;
    width:30px;height:30px;cursor:pointer;font-size:14px;font-weight:800;color:var(--ink);}
  .year-switch .y{font-family:'Gaegu',sans-serif;font-size:22px;font-weight:700;}

  .stat-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
  .tile{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:13px 10px;}
  .tile .num{font-size:21px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);}
  .tile .lab{font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-top:2px;}

  .type-summary{font-size:12px;color:var(--ink-soft);font-weight:600;margin:0 0 18px;}
  .type-summary b{color:var(--ink);}

  .member-block{background:var(--bg);border:1px solid var(--line);border-radius:16px;
    padding:14px 16px;margin-bottom:10px;}
  .mb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .mb-name{font-size:13.5px;font-weight:800;}
  .mb-count{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .bar-track{background:var(--card);border:1px solid var(--line);border-radius:999px;height:9px;overflow:hidden;margin-bottom:11px;}
  .bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .bar-fill[data-m="박형민"]{background:var(--dad);}
  .bar-fill[data-m="이희연"]{background:var(--mom);}
  .bar-fill[data-m="박한별"]{background:var(--girl1);}
  .bar-fill[data-m="박한솔"]{background:var(--girl2);}
  .chip-group{margin-bottom:6px;}
  .chip-group .cg-lab{font-size:10.5px;font-weight:800;color:var(--ink-soft);margin-bottom:5px;}
  .title-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .title-chip{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;}
  .title-chip.done[data-m="박형민"]{background:var(--dad);color:#fff;}
  .title-chip.done[data-m="이희연"]{background:var(--mom);color:#fff;}
  .title-chip.done[data-m="박한별"]{background:var(--girl1);color:#fff;}
  .title-chip.done[data-m="박한솔"]{background:var(--girl2);color:#fff;}
  .title-chip.reading{background:var(--card);border:1px dashed var(--line);color:var(--ink-soft);}
  .mb-empty{font-size:12px;color:var(--ink-soft);}

  .foot{text-align:center;color:var(--ink-soft);font-size:14px;margin-top:22px;font-family:'Gaegu',sans-serif;}

  @media (max-width:720px){
    .app{flex-direction:column;border-radius:20px;}
    .sidebar{
      width:100%;border-right:none;border-bottom:1px dashed var(--line);
      flex-direction:row;align-items:center;padding:14px 12px;gap:10px;
    }
    .nameplate{padding:0;}
    .np-title{font-size:20px;}
    .np-sub{display:none;}
    .shelf-list{flex-direction:row;overflow-x:auto;gap:6px;}
    .shelf-slot{white-space:nowrap;}
    .shelf-gap{display:none;}
    .main{padding:20px 18px 26px;}
    .grid{grid-template-columns:1fr;}
    .stat-tiles{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div class="setup-banner" id="setup-banner">
  ⚠️ <b>설정이 필요해요.</b> 아직 Google 스프레드시트(Apps Script)에 연결되지 않았어요. 코드 상단의 <code>APPS_SCRIPT_URL</code> 값을 본인의 웹 앱 URL로 바꿔주세요.
</div>

<div class="app">

  <aside class="sidebar">
    <div class="nameplate">
      <span class="np-title">패밀리로그</span>
      <span class="np-sub"><span class="sync-dot" id="sync-dot"></span>책·영화·유튜브, 우리 가족의 모든 기록</span>
    </div>
    <nav class="shelf-list" id="shelf-list">
      <button class="shelf-slot active" data-mode="log" data-m="전체"><span class="dot"></span>전체 기록</button>
      <button class="shelf-slot" data-mode="log" data-m="박형민"><span class="dot"></span>아빠 · 박형민</button>
      <button class="shelf-slot" data-mode="log" data-m="이희연"><span class="dot"></span>엄마 · 이희연</button>
      <button class="shelf-slot" data-mode="log" data-m="박한별"><span class="dot"></span>큰딸 · 박한별</button>
      <button class="shelf-slot" data-mode="log" data-m="박한솔"><span class="dot"></span>작은딸 · 박한솔</button>
      <div class="shelf-gap"></div>
      <button class="shelf-slot shelf-slot-gold" data-mode="wrap"><span class="dot"></span>연간 통계</button>
    </nav>
  </aside>

  <main class="main">
    <!-- ===== 기록 뷰 ===== -->
    <section id="view-log">
      <div class="main-head">
        <h2 id="log-title">전체 기록</h2>
        <button class="btn-add" id="btn-toggle-form">+ 새 기록</button>
      </div>
      <p class="stats-line" id="stats-line"></p>

      <div class="type-chips" id="type-chips">
        <button class="tchip active" data-t="전체">전체</button>
        <button class="tchip" data-t="book">책</button>
        <button class="tchip" data-t="movie">영화</button>
        <button class="tchip" data-t="youtube">유튜브</button>
        <button class="tchip" data-t="other">기타</button>
      </div>

      <div class="form-card" id="form-card">
        <p class="form-title" id="form-title-text">새로운 기록 남기기</p>

        <div class="type-toggle" id="type-toggle">
          <button type="button" class="type-btn active" data-t="book">📕 책</button>
          <button type="button" class="type-btn" data-t="movie">🎬 영화</button>
          <button type="button" class="type-btn" data-t="youtube">▶️ 유튜브</button>
          <button type="button" class="type-btn" data-t="other">✏️ 기타</button>
        </div>

        <div class="grid">
          <div class="field">
            <label>기록한 사람</label>
            <select id="f-member">
              <option value="박형민">아빠 · 박형민</option>

function esc(s){
  return (s||"").replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
}
function decodeEntities(s){
  const t = document.createElement('textarea');

}
function fmtDate(d){
  if(!d) return "";
  const s = String(d);
  const [y,m,day] = s.split("-");
  return `${parseInt(m)}/${parseInt(day)}`;
}
function fmtRange(entry){
  const parts = [];
  if(entry.startDate || entry.endDate){
    const a = fmtDate(entry.startDate), b = fmtDate(entry.endDate);
    parts.push(a && b ? `${a} – ${b}` : (a || b));
  }
  if((entry.type||'book') === 'book' && (entry.startPage || entry.endPage)){
    parts.push(`${entry.startPage || "?"} ~ ${entry.endPage || "?"}쪽`);
  }
  return parts;
}
function entryYear(e){
  const src = e.startDate || e.endDate;

/* ===== Google Apps Script(Sheets) 통신 =====
   조회는 JSONP, 쓰기는 no-cors fetch로 CORS 우회 */
function jsonp(url){
  return new Promise((resolve, reject)=>{
    const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
    const script = document.createElement('script');
    let done = false;
    window[cbName] = (data)=>{
      done = true;
      resolve(data);
      cleanup();
    };
    function cleanup(){
      delete window[cbName];
      script.remove();
    }
    script.onerror = ()=>{
      if(!done){ reject(new Error('JSONP 로드 실패')); cleanup(); }
    };
    script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${cbName}`;
    document.body.appendChild(script);
    setTimeout(()=>{ if(!done){ reject(new Error('JSONP 시간초과')); cleanup(); } }, 15000);
  });
}
async function fetchEntriesFromDB(){
  if(!IS_CONFIGURED) return [];
  try{
    const data = await jsonp(`${APPS_SCRIPT_URL}?action=list`);
    return (data.entries || []).map(e => ({...e, id:String(e.id)}));
  }catch(e){
    console.error('불러오기 실패', e);
    return [];
  }
}
async function putEntryToDB(entry){
  if(!IS_CONFIGURED) return;
  try{
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'add', entry})
    });
  }catch(e){ console.error('저장 실패', e); }
}

function renderLog(){
  logTitle.textContent = MSHORT[activeFilter];

  if(activeType !== "전체") list = list.filter(e=> entryType(e) === activeType);

  statsLine.textContent = sorted.length ? `총 ${sorted.length}개의 기록` : "";

  if(sorted.length === 0){
    entriesEl.innerHTML = `<div class="empty"><b>아직 기록이 없어요</b>'+ 새 기록'을 눌러 첫 페이지를 남겨보세요.</div>`;

  entriesEl.innerHTML = sorted.map(e=>{
    const type = entryType(e);

    const attachHtml = e.attachment ? `<img class="entry-attach" src="${e.attachment}" alt="" loading="lazy" onerror="this.style.display='none'">` : "";
    const hasMore = !!(e.content || e.attachment);
    const isOpen = expandedIds.has(String(e.id));
    const toggleHtml = hasMore ? `<button type="button" class="entry-toggle" data-id="${e.id}">${isOpen ? '접기 ▴' : '더보기 ▾'}</button>` : "";
    return `

        <button class="entry-edit" data-id="${e.id}">수정</button>

            </div>
            <div class="badge-row">
              ${statusHtml}
              <span class="badge" data-m="${e.member}">${e.member}</span>
            </div>
          </div>
          <div class="entry-meta">${meta}${linkHtml}</div>
          ${isOpen ? `
            ${content ? `<div class="entry-content">${content}</div>` : ""}
            ${attachHtml}
          ` : ""}
          ${toggleHtml}
        </div>
      </div>
    </div>`;
  }).join("");

  document.querySelectorAll('.entry-del').forEach(btn=>btn.addEventListener('click', onDeleteClick));
  document.querySelectorAll('.entry-edit').forEach(btn=>btn.addEventListener('click', (ev)=>{
    editEntry(btn.dataset.id);

    renderLog();
  }));
}

async function onDeleteClick(ev){
  const btn = ev.currentTarget;
  if(!btn.classList.contains('confirm')){
    btn.classList.add('confirm');
    btn.textContent = '정말 삭제?';
    btn._timer = setTimeout(()=>{ btn.classList.remove('confirm'); btn.textContent = '삭제'; }, 2800);
    return;
  }
  clearTimeout(btn._timer);
  const id = btn.dataset.id;
  entries = entries.filter(e=> String(e.id) !== String(id));
  renderAll();
  await deleteEntryFromDB(id);
}

function renderWrap(){
  document.getElementById('y-label').textContent = currentYear;
  const yearEntries = entries.filter(e=> entryYear(e) === currentYear);

  document.getElementById('stat-entries').textContent = yearEntries.length;

  let totalPages = 0;
  yearEntries.forEach(e=>{
    if(entryType(e) !== 'book') return;
    const sp = parseInt(e.startPage), ep = parseInt(e.endPage);
    if(!isNaN(sp) && !isNaN(ep) && ep >= sp) totalPages += (ep - sp + 1);
  });
  document.getElementById('stat-pages').textContent = totalPages.toLocaleString();

  const typeCounts = {book:0, movie:0, youtube:0, other:0};
  yearEntries.forEach(e=> typeCounts[entryType(e)]++);
  document.getElementById('type-summary').innerHTML =
    `<b>책</b> ${typeCounts.book} · <b>영화</b> ${typeCounts.movie} · <b>유튜브</b> ${typeCounts.youtube} · <b>기타</b> ${typeCounts.other}`;

  const doneSets = {}, allSets = {};
  MEMBERS.forEach(m=>{ doneSets[m] = new Set(); allSets[m] = new Set(); });
  yearEntries.forEach(e=>{
    const t = (e.title||"").trim();
    if(!t || !allSets[e.member]) return;
    const key = `${TLABEL[entryType(e)]} · ${t}`;
    allSets[e.member].add(key);
    if(entryStatus(e) === "done") doneSets[e.member].add(key);
  });

  let totalDone = 0, totalReading = 0;
  const readingSets = {};
  MEMBERS.forEach(m=>{
    readingSets[m] = new Set([...allSets[m]].filter(t=> !doneSets[m].has(t)));
    totalDone += doneSets[m].size;
    totalReading += readingSets[m].size;
  });
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-reading').textContent = totalReading;

  const maxCount = Math.max(1, ...MEMBERS.map(m=> yearEntries.filter(e=>e.member===m).length));

  const container = document.getElementById('member-blocks');
  container.innerHTML = MEMBERS.map(m=>{
    const cnt = yearEntries.filter(e=>e.member===m).length;
    const pct = Math.round((cnt / maxCount) * 100);
    const doneChips = [...doneSets[m]].map(t=>`<span class="title-chip done" data-m="${m}">${esc(t)}</span>`).join("");
    const readingChips = [...readingSets[m]].map(t=>`<span class="title-chip reading">${esc(t)}</span>`).join("");
    const hasAny = doneSets[m].size || readingSets[m].size;
    return `
    <div class="member-block">
      <div class="mb-head">
        <span class="mb-name">${MLABEL[m]}</span>
        <span class="mb-count">완료 ${doneSets[m].size} · 진행 중 ${readingSets[m].size}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" data-m="${m}" style="width:${cnt? pct : 0}%"></div></div>
      ${hasAny ? `
        ${doneSets[m].size ? `<div class="chip-group"><div class="cg-lab">완료</div><div class="title-chips">${doneChips}</div></div>` : ""}
        ${readingSets[m].size ? `<div class="chip-group"><div class="cg-lab">진행 중</div><div class="title-chips">${readingChips}</div></div>` : ""}
      ` : `<span class="mb-empty">${currentYear}년 기록 없음</span>`}
    </div>`;
  }).join("");
}

  if(formType === 'book') searchBooks(q);
  else if(formType === 'movie') searchMovies(q);
  else if(formType === 'youtube'){
    if(ytSelectedChannel) searchChannelVideos(ytSelectedChannel.id, q);
    else if(ytMode === 'channel') searchYoutubeChannels(q);
    else searchYoutube(q);
  }
}
titleInput.addEventListener('input', ()=>{
  formThumbnail = "";
  formLink = "";
  thumbPreview.hidden = true;
  if(!SEARCHABLE_TYPES.includes(formType)){ searchDD.hidden = true; return; }
  clearTimeout(searchTimer);
  const q = titleInput.value.trim();
  if(q.length < 2){ searchDD.hidden = true; return; }
  searchTimer = setTimeout(()=> runSearch(q), 350);
});
document.addEventListener('click', (ev)=>{
  if(!searchDD.contains(ev.target) && ev.target !== titleInput){ searchDD.hidden = true; }
});

async function searchBooks(q){
  try{
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=5&key=${GOOGLE_API_KEY}`);
    const data = await res.json();
    const items = (data.items || []).map(it=>{
      const info = it.volumeInfo || {};
      const thumb = (info.imageLinks && (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail)) || '';
      return {
        title: info.title || '',
        subtitle: (info.authors||[]).join(', '),
        creator: (info.authors||[]).join(', '),
        thumb, link: ''
      };
    });
    renderSearchResults(items);
  }catch(e){ console.error('책 검색 실패', e); }
}

async function searchMovies(q){
  try{
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=ko-KR&query=${encodeURIComponent(q)}`);
    const data = await res.json();
    const items = (data.results || []).slice(0,5).map(m=>{
      const year = m.release_date ? m.release_date.slice(0,4) : '';
      return {
        title: m.title || '',
        subtitle: year,
        creator: year,
        thumb: m.poster_path ? `https://image.tmdb.org/t/p/w200${m.poster_path}` : '',
        link: ''
      };
    });
    renderSearchResults(items);
  }catch(e){ console.error('영화 검색 실패', e); }
}

async function searchYoutube(q){
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${encodeURIComponent(q)}&key=${GOOGLE_API_KEY}`);
    const data = await res.json();
    const items = (data.items || []).map(v=>{
      const title = decodeEntities(v.snippet.title || '');
      const channel = decodeEntities(v.snippet.channelTitle || '');
      const thumb = (v.snippet.thumbnails && v.snippet.thumbnails.default && v.snippet.thumbnails.default.url) || '';
      return {
        title, subtitle: channel, creator: channel, thumb,
        link: `https://www.youtube.com/watch?v=${v.id.videoId}`
      };
    });
    renderSearchResults(items);
  }catch(e){ console.error('유튜브 검색 실패', e); }
}

async function searchYoutubeChannels(q){
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=5&q=${encodeURIComponent(q)}&key=${GOOGLE_API_KEY}`);
    const data = await res.json();
    if(data.error){ console.error('채널 검색 API 오류', data.error); renderSearchResults([]); return; }
    const items = (data.items || []).map(c=>{
      const title = decodeEntities(c.snippet.title || '');
      const thumb = (c.snippet.thumbnails && c.snippet.thumbnails.default && c.snippet.thumbnails.default.url) || '';
      const channelId = (c.id && c.id.channelId) || c.snippet.channelId || '';
      return {
        title, subtitle: '채널', thumb,
        _isChannel: true, _channelId: channelId
      };
    });
    renderSearchResults(items);
  }catch(e){ console.error('채널 검색 실패', e); }
}

async function searchChannelVideos(channelId, q){
  try{
    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&channelId=${channelId}&key=${GOOGLE_API_KEY}`;
    url += q ? `&q=${encodeURIComponent(q)}` : `&order=date`;
    const res = await fetch(url);
    const data = await res.json();
    const items = (data.items || []).map(v=>{
      const title = decodeEntities(v.snippet.title || '');
      const thumb = (v.snippet.thumbnails && v.snippet.thumbnails.default && v.snippet.thumbnails.default.url) || '';
      return {
        title, subtitle: ytSelectedChannel ? ytSelectedChannel.title : '',
        creator: ytSelectedChannel ? ytSelectedChannel.title : '',
        thumb, link: `https://www.youtube.com/watch?v=${v.id.videoId}`
      };
    });
    renderSearchResults(items);
  }catch(e){ console.error('채널 영상 검색 실패', e); }
}

function renderSearchResults(items){
  if(!items.length){ searchDD.hidden = true; searchDD.innerHTML=''; return; }
  searchDD.innerHTML = items.map((it,i)=>{
    const thumb = it.thumb ? it.thumb.replace('http://','https://') : '';
    return `<button type="button" class="book-result" data-i="${i}">
      ${thumb ? `<img src="${thumb}" alt="" referrerpolicy="no-referrer" loading="lazy">` : `<span class="book-noimg"></span>`}
      <span class="br-text"><b>${esc(it.title)}</b>${it.subtitle?`<i>${esc(it.subtitle)}</i>`:''}</span>
    </button>`;
  }).join('');
  searchDD._items = items;
  searchDD.hidden = false;
}
function selectSearchResult(it){
  if(it._isChannel){
    ytSelectedChannel = { id: it._channelId, title: it.title };
    const infoEl = document.getElementById('yt-channel-info');
    infoEl.innerHTML = `<span>📺 ${esc(it.title)} 채널 영상 중에서 선택하세요</span><button type="button" id="btn-reset-channel">채널 다시 선택</button>`;
    infoEl.hidden = false;
    document.getElementById('btn-reset-channel').addEventListener('click', ()=>{
      ytSelectedChannel = null;
      infoEl.hidden = true;
      titleInput.value = '';
      searchDD.hidden = true;
    });
    titleInput.value = '';
    searchChannelVideos(it._channelId, '');
    return;
  }
  titleInput.value = it.title || '';
  document.getElementById('f-creator').value = it.creator || '';
  formLink = it.link || '';
  formThumbnail = it.thumb ? it.thumb.replace('http://','https://') : '';
  if(formThumbnail){
    thumbPreviewImg.src = formThumbnail;
    thumbPreview.hidden = false;
  }else{
    thumbPreview.hidden = true;
  }
  searchDD.hidden = true;
}
searchDD.addEventListener('click', (ev)=>{
  const btn = ev.target.closest('.book-result');
  if(!btn) return;
  selectSearchResult(searchDD._items[parseInt(btn.dataset.i)]);
});
titleInput.addEventListener('keydown', (ev)=>{
  if(ev.key !== 'Enter') return;
  ev.preventDefault();
  if(!SEARCHABLE_TYPES.includes(formType)) return;
  if(!searchDD.hidden && searchDD._items && searchDD._items.length){
    selectSearchResult(searchDD._items[0]);
  }else{
    clearTimeout(searchTimer);
    const q = titleInput.value.trim();
    if(q.length >= 2) runSearch(q);
  }
});

// ===== 사진 첨부 (선택, 클라이언트에서 리사이즈 후 base64로 전송) =====
function compressImage(file, maxDim, quality){
  maxDim = maxDim || 1000; quality = quality || 0.72;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else{ w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
attachInput.addEventListener('change', async ()=>{
  const file = attachInput.files[0];
  if(!file) return;
  try{
    formAttachmentBase64 = await compressImage(file);
    attachPreviewImg.src = 'data:image/jpeg;base64,' + formAttachmentBase64;
    attachPreview.hidden = false;
  }catch(err){ console.error('이미지 처리 실패', err); }
});
document.getElementById('btn-remove-attach').addEventListener('click', ()=>{
  formAttachmentBase64 = "";
  attachInput.value = "";
  attachPreview.hidden = true;
});

// form toggle
const btnToggle = document.getElementById('btn-toggle-form');
btnToggle.addEventListener('click', ()=>{
  if(formCard.classList.contains('open') && editingId){
    resetFormAfterSave();
    return;
  }
  formCard.classList.toggle('open');
  if(formCard.classList.contains('open') && activeFilter !== "전체"){
    document.getElementById('f-member').value = activeFilter;
  }
});
document.getElementById('btn-cancel').addEventListener('click', ()=> resetFormAfterSave());

function resetFormAfterSave(){
  titleInput.value = "";
  document.getElementById('f-creator').value = "";
  document.getElementById('f-start-date').value = "";
  document.getElementById('f-end-date').value = "";
  document.getElementById('f-start-page').value = "";
  document.getElementById('f-end-page').value = "";
  document.getElementById('f-content').value = "";
  attachInput.value = "";
  attachPreview.hidden = true;
  formAttachmentBase64 = "";
  formExistingAttachment = "";
  formThumbnail = "";
  formLink = "";
  thumbPreview.hidden = true;
  setFormStatus('reading');
  setFormType('book');
  editingId = null;
  document.getElementById('form-title-text').textContent = '새로운 기록 남기기';
  document.getElementById('btn-save').textContent = '기록 저장';
  formCard.classList.remove('open');
}

function editEntry(id){
  const e = entries.find(x=> String(x.id) === String(id));
  if(!e) return;
  editingId = String(id);

  document.getElementById('form-title-text').textContent = '기록 수정하기';
  document.getElementById('btn-save').textContent = '수정 저장';
  formCard.classList.add('open');

  setFormType(entryType(e));
  document.getElementById('f-member').value = e.member;
  titleInput.value = e.title || '';
  document.getElementById('f-creator').value = e.creator || '';
  document.getElementById('f-start-date').value = e.startDate || '';
  document.getElementById('f-end-date').value = e.endDate || '';
  document.getElementById('f-start-page').value = e.startPage || '';
  document.getElementById('f-end-page').value = e.endPage || '';
  document.getElementById('f-content').value = e.content || '';
  setFormStatus(entryStatus(e));

  formThumbnail = e.thumbnail || '';
  formLink = e.link || '';
  if(formThumbnail){
    thumbPreviewImg.src = formThumbnail;
    thumbPreview.hidden = false;
  }

  formExistingAttachment = e.attachment || '';
  formAttachmentBase64 = '';
  attachInput.value = '';
  if(formExistingAttachment){
    attachPreviewImg.src = formExistingAttachment;
    attachPreview.hidden = false;
  }

  formCard.scrollIntoView({behavior:'smooth', block:'start'});
}

document.getElementById('btn-save').addEventListener('click', async ()=>{
  const member = document.getElementById('f-member').value;
  const title = titleInput.value.trim();
  const creator = document.getElementById('f-creator').value.trim();
  const startDate = document.getElementById('f-start-date').value;
  const endDate = document.getElementById('f-end-date').value;
  const startPage = formType === 'book' ? document.getElementById('f-start-page').value : '';
  const endPage = formType === 'book' ? document.getElementById('f-end-page').value : '';
  const content = document.getElementById('f-content').value.trim();

  if(!title){
    titleInput.focus();
    titleInput.style.borderColor = '#E23F6B';
    setTimeout(()=>{ titleInput.style.borderColor=''; }, 1500);
    return;
  }

  const isEdit = !!editingId;
  const original = isEdit ? entries.find(x=> String(x.id) === String(editingId)) : null;

  const newEntry = {
    id: isEdit ? editingId : (Date.now().toString(36) + Math.random().toString(36).slice(2, 8)),
    member, type: formType, title, creator, thumbnail: formThumbnail, link: formLink,
    startDate, endDate, startPage, endPage, content,
    status: formStatus,
    createdAt: isEdit && original ? original.createdAt : Date.now()
  };

  if(formAttachmentBase64){
    newEntry.attachmentData = formAttachmentBase64;
    newEntry.attachmentType = 'image/jpeg';
    newEntry.attachment = 'data:image/jpeg;base64,' + formAttachmentBase64; // 로컬 즉시표시용
  }else if(formExistingAttachment){
    newEntry.attachment = formExistingAttachment;
  }

  if(isEdit){
    const idx = entries.findIndex(x=> String(x.id) === String(editingId));
    if(idx > -1) entries[idx] = newEntry; else entries.push(newEntry);
  }else{
    entries.push(newEntry);
  }

  resetFormAfterSave();
  renderAll();

  syncDot.classList.add('busy');
  if(isEdit) await updateEntryInDB(newEntry); else await putEntryToDB(newEntry);
  syncDot.classList.remove('busy');
});

setFormType('book');
refreshFromDB(false);
setInterval(()=> refreshFromDB(true), 12000);
